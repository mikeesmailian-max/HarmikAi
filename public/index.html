<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmik AI Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;background:#6EC6FF;}
canvas#highway{position:fixed;inset:0;z-index:0;display:block;}
.view{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1),filter .6s;}
.view.hidden{opacity:0;transform:scale(.97) translateY(-18px);filter:blur(8px);pointer-events:none;}

/* ===== LOCK SCREEN ===== */
.lock-wrap{display:flex;flex-direction:column;align-items:center;gap:0;}

.truck-hero{margin-bottom:14px;filter:drop-shadow(0 10px 28px rgba(0,0,0,.18)) drop-shadow(0 2px 6px rgba(0,0,0,.12));transition:filter .3s,transform .3s;}
.truck-hero:hover{filter:drop-shadow(0 16px 40px rgba(240,30,44,.3)) drop-shadow(0 4px 12px rgba(0,0,0,.15));transform:translateY(-4px);}

.lock-logo{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo-mark{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#F01E2C,#A80D17);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(240,30,44,.38);}
.logo-text{font-size:33px;font-weight:800;color:#0D2B6E;letter-spacing:-1px;text-shadow:0 1px 0 rgba(255,255,255,.6);}
.logo-text em{color:#F01E2C;font-style:normal;}

.lock-clock{font-size:128px;font-weight:100;letter-spacing:-7px;color:#0D2B6E;line-height:.88;text-align:center;text-shadow:0 2px 20px rgba(255,255,255,.8),0 1px 0 rgba(255,255,255,.5);margin-bottom:6px;}
.lock-date{font-size:17px;color:rgba(13,43,110,.65);text-align:center;letter-spacing:.3px;font-weight:500;margin-bottom:30px;}

.login-card{width:480px;background:rgba(255,255,255,.82);backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:2px solid rgba(255,255,255,.9);border-radius:30px;overflow:hidden;box-shadow:0 24px 80px rgba(0,80,200,.18),0 4px 16px rgba(0,0,0,.08),0 0 0 1px rgba(255,255,255,.5) inset;}
.login-stripe{height:7px;background:linear-gradient(90deg,#F01E2C 0%,#C01020 40%,#1565C0 60%,#0D47A1 100%);position:relative;overflow:hidden;}
.login-stripe::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);transition:left .65s ease;}
.login-card:hover .login-stripe::after{left:150%;}

.login-body{padding:34px 40px 28px;}
.login-title{font-size:25px;font-weight:800;color:#0D2B6E;margin-bottom:3px;letter-spacing:-.3px;}
.login-sub{font-size:14px;color:rgba(13,43,110,.45);margin-bottom:24px;font-weight:500;}
.login-err{height:18px;font-size:13px;color:#D01020;font-weight:700;margin-bottom:7px;}
.pwd-wrap{position:relative;}
.pwd{width:100%;height:58px;background:rgba(13,43,110,.06);border:2px solid rgba(13,43,110,.15);border-radius:16px;color:#0D2B6E;font-size:17px;letter-spacing:3px;padding:0 68px 0 20px;outline:none;font-family:inherit;transition:border-color .25s,box-shadow .25s,background .25s;}
.pwd::placeholder{color:rgba(13,43,110,.3);letter-spacing:.2px;font-size:14px;}
.pwd:focus{border-color:rgba(21,101,192,.5);box-shadow:0 0 0 4px rgba(21,101,192,.12);background:rgba(255,255,255,.9);}
.pwd-btn{position:absolute;right:8px;top:8px;width:42px;height:42px;background:linear-gradient(135deg,#F01E2C,#A80D17);border:none;border-radius:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 16px rgba(240,30,44,.42);}
.pwd-btn:hover{transform:scale(1.1);box-shadow:0 6px 22px rgba(240,30,44,.6);}
.pwd-btn:active{transform:scale(.88);}

.login-footer{display:flex;align-items:center;justify-content:space-between;padding:13px 40px;background:rgba(13,43,110,.04);border-top:1.5px solid rgba(13,43,110,.08);}
.lf-secure{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(13,43,110,.45);font-weight:600;}
.lf-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 7px #22c55e;}
.lf-brand{font-size:12px;font-weight:800;background:linear-gradient(90deg,#F01E2C,#1565C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.shake{animation:shake .4s ease;}
@keyframes shake{10%,90%{transform:translateX(-5px)}20%,80%{transform:translateX(7px)}30%,50%,70%{transform:translateX(-11px)}40%,60%{transform:translateX(11px)}}

/* ===== HOME ===== */
#home{justify-content:flex-start;background:#EEF1F8;}
.topbar{width:100%;height:68px;flex-shrink:0;background:linear-gradient(90deg,#0D1B3E,#1565C0 50%,#F01E2C);display:flex;align-items:center;padding:0 48px;justify-content:space-between;box-shadow:0 2px 20px rgba(13,27,62,.25);}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.tb-name{font-size:18px;font-weight:700;color:#fff;}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.2);margin:0 8px;}
.tb-sub{font-size:13px;color:rgba(255,255,255,.5);}
.tb-right{display:flex;align-items:center;gap:14px;}
.tb-time{font-size:15px;font-weight:600;color:rgba(255,255,255,.75);}
.lock-btn{padding:9px 18px;border-radius:10px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:rgba(255,255,255,.88);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;font-family:inherit;}
.lock-btn:hover{background:rgba(255,255,255,.22);color:#fff;}
.main{width:100%;height:calc(100vh - 68px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;}
.greeting{text-align:center;margin-bottom:54px;}
.greeting-h{font-size:28px;font-weight:700;color:#111827;letter-spacing:-.3px;}
.greeting-h .name{background:linear-gradient(90deg,#F01E2C,#1565C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.greeting-sub{font-size:14px;color:rgba(17,24,39,.38);margin-top:6px;}
.apps-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;max-width:1000px;}
.app-tile{display:flex;flex-direction:column;align-items:center;gap:16px;cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;width:160px;-webkit-tap-highlight-color:transparent;}
.app-icon-wrap{width:130px;height:130px;border-radius:34px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 14px 40px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.12);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;transform-style:preserve-3d;}
.app-icon-wrap::after{content:"";position:absolute;inset:0;border-radius:34px;background:linear-gradient(175deg,rgba(255,255,255,.28) 0%,transparent 55%);pointer-events:none;}
.app-tile:hover .app-icon-wrap{transform:scale(1.1) translateY(-6px);box-shadow:0 24px 56px rgba(0,0,0,.22),0 8px 20px rgba(0,0,0,.14);}
.app-tile:active .app-icon-wrap{transform:scale(.92) translateY(2px);}
.app-icon-wrap svg{width:60px;height:60px;position:relative;z-index:2;}
.ic-red{background:linear-gradient(145deg,#FF3A47,#C41020);}
.ic-blue{background:linear-gradient(145deg,#2A7DE8,#0D47A1);}
.ic-dkred{background:linear-gradient(145deg,#C41020,#7A0A12);}
.ic-navy{background:linear-gradient(145deg,#1E3A7A,#0A1B4A);}
.ic-mix{background:linear-gradient(145deg,#D41830,#1565C0);}
.app-label{font-size:15px;font-weight:700;color:#111827;text-align:center;line-height:1.25;}
.app-sublabel{font-size:12px;color:rgba(17,24,39,.4);text-align:center;margin-top:3px;}
</style>
</head>

<script>
/* ===================== BRIGHT HIGHWAY CANVAS ===================== */
const canvas = document.getElementById('highway');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let cloudData = [];

function initClouds(W) {
  cloudData = [];
  const clouds = [
    [0.1,0.12,55], [0.28,0.08,42], [0.45,0.15,65], [0.62,0.1,50],
    [0.78,0.07,38], [0.9,0.13,48], [0.2,0.22,35], [0.55,0.19,44],
    [0.85,0.24,40], [0.07,0.28,30], [0.72,0.2,36]
  ];
  clouds.forEach(([fx,fy,r]) => cloudData.push({fx,fy,r}));
}

function drawCloud(ctx, x, y, r) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.shadowColor = 'rgba(200,220,255,0.4)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.arc(x + r*0.85, y + r*0.12, r*0.72, 0, Math.PI*2);
  ctx.arc(x + r*1.55, y, r*0.62, 0, Math.PI*2);
  ctx.arc(x + r*0.9, y - r*0.45, r*0.58, 0, Math.PI*2);
  ctx.arc(x + r*0.35, y - r*0.35, r*0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawHighway() {
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const HZ = H * 0.52; // horizon
  const VX = W/2 + (mx - W/2) * 0.04;
  const VY = HZ + (my - H/2) * 0.015;

  if (!cloudData.length) initClouds(W);

  /* 1. Sky - vibrant bright blue gradient */
  const sky = ctx.createLinearGradient(0, 0, 0, HZ + 30);
  sky.addColorStop(0, '#1A78E8');
  sky.addColorStop(0.45, '#3D9EFF');
  sky.addColorStop(0.75, '#72C0FF');
  sky.addColorStop(1, '#B8E0FF');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, HZ + 30);

  /* 2. Sun glow on horizon */
  const sunX = W * 0.5 + (mx - W/2) * 0.02;
  const sg = ctx.createRadialGradient(sunX, HZ, 0, sunX, HZ, W * 0.45);
  sg.addColorStop(0, 'rgba(255,240,100,0.55)');
  sg.addColorStop(0.18, 'rgba(255,200,60,0.25)');
  sg.addColorStop(0.5, 'rgba(255,160,40,0.1)');
  sg.addColorStop(1, 'transparent');
  ctx.fillStyle = sg;
  ctx.fillRect(0, HZ - 100, W, 200);

  /* 3. Sun disc */
  const sun = ctx.createRadialGradient(sunX, HZ, 0, sunX, HZ, 36);
  sun.addColorStop(0, 'rgba(255,252,200,1)');
  sun.addColorStop(0.35, 'rgba(255,220,80,0.9)');
  sun.addColorStop(1, 'transparent');
  ctx.fillStyle = sun;
  ctx.beginPath();
  ctx.arc(sunX, HZ, 36, 0, Math.PI * 2);
  ctx.fill();

  /* 4. Clouds (parallax with mouse) */
  cloudData.forEach((c, i) => {
    const px = c.fx * W + (mx - W/2) * (0.01 + i % 3 * 0.005);
    const py = c.fy * HZ + (my - H/2) * (0.008 + i % 2 * 0.004);
    drawCloud(ctx, px, py, c.r);
  });

  /* 5. Distant green hills */
  ctx.fillStyle = '#5CBF4A';
  ctx.beginPath();
  ctx.moveTo(0, HZ + 5);
  for (let x = 0; x <= W; x += 80) {
    const hv = 18 + ((x * 37 + 13) % 40);
    ctx.quadraticCurveTo(x + 40, HZ - hv, x + 80, HZ + 5);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fill();

  /* 6. Green shoulder areas */
  const gLeft = ctx.createLinearGradient(0, HZ, 0, H);
  gLeft.addColorStop(0, '#6DD45A');
  gLeft.addColorStop(1, '#4BA83C');
  ctx.fillStyle = gLeft;
  // Left shoulder
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(VX - 90, VY + 5);
  ctx.lineTo(0, HZ + 5);
  ctx.closePath();
  ctx.fill();
  // Right shoulder
  ctx.beginPath();
  ctx.moveTo(W, H);
  ctx.lineTo(VX + 90, VY + 5);
  ctx.lineTo(W, HZ + 5);
  ctx.closePath();
  ctx.fill();

  /* 7. Road surface - bright concrete */
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(VX - 90, VY + 5);
  ctx.lineTo(VX + 90, VY + 5);
  ctx.lineTo(W, H);
  const roadG = ctx.createLinearGradient(0, VY, 0, H);
  roadG.addColorStop(0, '#C8CED8');
  roadG.addColorStop(0.3, '#D4D8E4');
  roadG.addColorStop(1, '#B8BEC8');
  ctx.fillStyle = roadG;
  ctx.fill();

  /* 8. Road center divider stripe */
  ctx.beginPath();
  ctx.moveTo(W * 0.35, H);
  ctx.lineTo(VX - 28, VY + 6);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(W * 0.65, H);
  ctx.lineTo(VX + 28, VY + 6);
  ctx.stroke();

  /* 9. White edge lines */
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(W * 0.04, H);
  ctx.lineTo(VX - 84, VY + 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(W * 0.96, H);
  ctx.lineTo(VX + 84, VY + 6);
  ctx.stroke();

  /* 10. Yellow dashed center line - perspective */
  for (let t = 0; t < 0.97; t += 0.085) {
    const t2 = Math.min(t + 0.052, 0.97);
    const x1 = W/2 + (VX - W/2) * (1 - t);
    const y1 = H + (VY + 6 - H) * (1 - t);
    const x2 = W/2 + (VX - W/2) * (1 - t2);
    const y2 = H + (VY + 6 - H) * (1 - t2);
    ctx.strokeStyle = `rgba(255,200,0,${0.5 + t * 0.45})`;
    ctx.lineWidth = 0.8 + t * 3;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  /* 11. Road surface shine */
  const shine = ctx.createLinearGradient(W*0.3, VY+10, W*0.7, H);
  shine.addColorStop(0, 'transparent');
  shine.addColorStop(0.5, 'rgba(255,255,255,0.12)');
  shine.addColorStop(1, 'transparent');
  ctx.fillStyle = shine;
  ctx.beginPath();
  ctx.moveTo(VX - 100, H);
  ctx.lineTo(VX - 4, VY + 20);
  ctx.lineTo(VX + 4, VY + 20);
  ctx.lineTo(VX + 100, H);
  ctx.closePath(); ctx.fill();

  /* 12. Distance haze over road */
  const haze = ctx.createLinearGradient(0, VY, 0, VY + 60);
  haze.addColorStop(0, 'rgba(180,210,255,0.45)');
  haze.addColorStop(1, 'transparent');
  ctx.fillStyle = haze;
  ctx.beginPath();
  ctx.moveTo(0, VY + 60);
  ctx.lineTo(VX - 90, VY + 5);
  ctx.lineTo(VX + 90, VY + 5);
  ctx.lineTo(W, VY + 60);
  ctx.closePath(); ctx.fill();

  /* 13. Subtle vignette */
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,30,80,0.18)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

/* ===================== CLOCK ===================== */
function tick() {
  const d = new Date(), h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const h12 = ((h+11)%12)+1, t = h12+':'+m;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mons=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const ds = days[d.getDay()]+', '+mons[d.getMonth()]+' '+d.getDate();
  document.getElementById('lock-clock').textContent = t;
  document.getElementById('lock-date').textContent = ds;
  document.getElementById('home-clock').textContent = t;
  document.getElementById('greeting-date').textContent = ds;
  document.getElementById('greeting').textContent = h<12?'morning':h<17?'afternoon':'evening';
}
tick(); setInterval(tick, 1000);
