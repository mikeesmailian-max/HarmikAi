<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaFleet Portal — Harmik AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#EEF1F8;color:#111827;overflow:hidden;}

/* ===== BACKGROUND ===== */
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#EEF1F8 0%,#E4E9F5 60%,#EBEEf8 100%);}

/* ===== VIEWS ===== */
.view{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1),filter .5s;}
.view.hidden{opacity:0;transform:scale(.97) translateY(-14px);filter:blur(6px);pointer-events:none;}

/* ===== LOCK SCREEN ===== */
.lock-wrap{display:flex;flex-direction:column;align-items:center;}
.lock-logo{display:flex;align-items:center;gap:14px;margin-bottom:36px;}
.logo-mark{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,#F01E2C,#A80D17);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(240,30,44,.35);}
.logo-text{font-size:32px;font-weight:700;color:#111827;letter-spacing:-.4px;}
.logo-text em{color:#1565C0;font-style:normal;font-weight:300;}
.lock-clock{font-size:112px;font-weight:100;letter-spacing:-6px;color:#111827;line-height:.88;text-align:center;margin-bottom:10px;}
.lock-date{font-size:17px;color:rgba(17,24,39,.42);text-align:center;margin-bottom:44px;}

.login-card{width:460px;background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 24px 80px rgba(17,24,39,.12),0 4px 20px rgba(240,30,44,.06);transition:box-shadow .3s,transform .3s;}
.login-card:hover{box-shadow:0 32px 100px rgba(17,24,39,.16),0 8px 30px rgba(240,30,44,.1);}
.login-stripe{height:7px;background:linear-gradient(90deg,#F01E2C 0%,#A80D17 38%,#1565C0 62%,#0D47A1 100%);position:relative;overflow:hidden;}
.login-stripe::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transition:left .6s ease;}
.login-card:hover .login-stripe::after{left:140%;}
.login-body{padding:40px 40px 32px;}
.login-truck{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:14px 18px;background:#F4F6FA;border-radius:14px;border:1.5px solid #E8EBF4;}
.lt-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#F01E2C,#A80D17);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lt-text{font-size:13px;color:rgba(17,24,39,.45);line-height:1.5;}
.lt-text strong{display:block;font-size:16px;font-weight:700;color:#111827;}
.login-title{font-size:24px;font-weight:700;color:#111827;margin-bottom:4px;}
.login-sub{font-size:14px;color:rgba(17,24,39,.4);margin-bottom:24px;}
.pwd-wrap{position:relative;margin-bottom:10px;}
.pwd{width:100%;height:58px;background:#F4F6FA;border:2px solid #E5E9F2;border-radius:14px;color:#111827;font-size:16px;letter-spacing:2.5px;padding:0 66px 0 20px;outline:none;font-family:inherit;transition:border-color .25s,box-shadow .25s,background .25s;}
.pwd::placeholder{color:rgba(17,24,39,.28);letter-spacing:.3px;font-size:14px;}
.pwd:focus{border-color:#1565C0;box-shadow:0 0 0 4px rgba(21,101,192,.1);background:#fff;}
.pwd-btn{position:absolute;right:8px;top:9px;width:42px;height:40px;background:linear-gradient(135deg,#F01E2C,#A80D17);border:none;border-radius:12px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .2s;box-shadow:0 4px 14px rgba(240,30,44,.38);}
.pwd-btn:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(240,30,44,.55);}
.pwd-btn:active{transform:scale(.9);}
.login-err{height:18px;font-size:13px;color:#F01E2C;font-weight:600;margin-bottom:6px;}
.shake{animation:shake .4s ease;}
@keyframes shake{10%,90%{transform:translateX(-4px)}20%,80%{transform:translateX(6px)}30%,50%,70%{transform:translateX(-9px)}40%,60%{transform:translateX(9px)}}
.login-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:#F9FAFB;border-top:1px solid #EEF1F8;}
.lf-secure{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(17,24,39,.35);font-weight:500;}
.lf-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;}
.lf-brand{font-size:12px;font-weight:700;background:linear-gradient(90deg,#F01E2C,#1565C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* ===== HOME ===== */
#home{justify-content:flex-start;}
.topbar{width:100%;height:68px;flex-shrink:0;background:linear-gradient(90deg,#0D1B3E,#1565C0 50%,#F01E2C);display:flex;align-items:center;padding:0 48px;justify-content:space-between;box-shadow:0 2px 20px rgba(13,27,62,.25);}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.tb-name{font-size:18px;font-weight:700;color:#fff;}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.2);margin:0 8px;}
.tb-sub{font-size:13px;color:rgba(255,255,255,.5);}
.tb-right{display:flex;align-items:center;gap:14px;}
.tb-time{font-size:15px;font-weight:600;color:rgba(255,255,255,.75);}
.lock-btn{padding:9px 18px;border-radius:10px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:rgba(255,255,255,.88);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;font-family:inherit;}
.lock-btn:hover{background:rgba(255,255,255,.22);color:#fff;}

/* Main content area */
.main{width:100%;height:calc(100vh - 68px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;}

/* Greeting */
.greeting{text-align:center;margin-bottom:54px;}
.greeting-h{font-size:28px;font-weight:700;color:#111827;letter-spacing:-.3px;}
.greeting-h .name{background:linear-gradient(90deg,#F01E2C,#1565C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.greeting-sub{font-size:14px;color:rgba(17,24,39,.38);margin-top:6px;}

/* App grid */
.apps-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;max-width:1000px;}

/* Apple-style app tile */
.app-tile{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
  width:160px;
}
.app-icon-wrap{
  width:130px;height:130px;border-radius:34px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:0 14px 40px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.12);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  transform-style:preserve-3d;
}
.app-icon-wrap::after{
  content:"";position:absolute;inset:0;border-radius:34px;
  background:linear-gradient(175deg,rgba(255,255,255,.28) 0%,transparent 55%);
  pointer-events:none;
}
.app-tile:hover .app-icon-wrap{
  transform:scale(1.1) translateY(-6px);
  box-shadow:0 24px 56px rgba(0,0,0,.22),0 8px 20px rgba(0,0,0,.14);
}
.app-tile:active .app-icon-wrap{
  transform:scale(.92) translateY(2px);
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}
.app-icon-wrap svg{width:60px;height:60px;position:relative;z-index:2;}

/* Gradient fills */
.ic-red{background:linear-gradient(145deg,#FF3A47,#C41020);}
.ic-blue{background:linear-gradient(145deg,#2A7DE8,#0D47A1);}
.ic-dkred{background:linear-gradient(145deg,#C41020,#7A0A12);}
.ic-navy{background:linear-gradient(145deg,#1E3A7A,#0A1B4A);}
.ic-mix{background:linear-gradient(145deg,#D41830,#1565C0);}

.app-label{font-size:15px;font-weight:700;color:#111827;text-align:center;line-height:1.25;}
.app-sublabel{font-size:12px;color:rgba(17,24,39,.4);text-align:center;margin-top:3px;}

@media(max-width:700px){
  .apps-grid{gap:18px;}
  .app-tile{width:120px;}
  .app-icon-wrap{width:100px;height:100px;border-radius:26px;}
  .app-icon-wrap svg{width:48px;height:48px;}
  .topbar,.login-card{padding-left:16px;padding-right:16px;}
  .lock-clock{font-size:80px;}
  .login-card{width:calc(100vw - 32px);}
}
</style>
</head>
<body>

<div class="bg"></div>

<!-- LOCK SCREEN -->
<div class="view" id="lock">
  <div class="lock-wrap">
    <div class="lock-logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M1 17l2-6h12l2 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 11V5h4l3 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="18.5" r="1.5" fill="#fff"/><circle cx="17.5" cy="18.5" r="1.5" fill="#fff"/></svg>
      </div>
      <div class="logo-text">Harmik <em>AI</em></div>
    </div>
    <div class="lock-clock" id="lock-clock">9:41</div>
    <div class="lock-date" id="lock-date">Tuesday, June 9</div>
    <div class="login-card">
      <div class="login-stripe"></div>
      <div class="login-body">
        <div class="login-truck">
          <div class="lt-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M1 17l2-6h12l2 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 11V5h4l3 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="18.5" r="1.5" fill="#fff"/><circle cx="17.5" cy="18.5" r="1.5" fill="#fff"/></svg>
          </div>
          <div class="lt-text"><strong>MegaFleet Portal</strong>Logistics & Fleet Management</div>
        </div>
        <div class="login-title">Welcome back, Master Harmik</div>
        <div class="login-sub">Enter your password to access the portal</div>
        <form id="pwd-form" autocomplete="off">
          <div class="login-err" id="login-err"></div>
          <div class="pwd-wrap">
            <input class="pwd" id="pwd" type="password" placeholder="Enter your password" autocomplete="new-password">
            <button class="pwd-btn" type="submit">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </form>
      </div>
      <div class="login-footer">
        <div class="lf-secure"><div class="lf-dot"></div> Secure Access</div>
        <div class="lf-brand">Harmik AI</div>
      </div>
    </div>
  </div>
</div>

<!-- HOME -->
<div class="view hidden" id="home">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 17l2-6h12l2 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13 11V5h4l3 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="18.5" r="1.5" fill="#fff"/><circle cx="17.5" cy="18.5" r="1.5" fill="#fff"/></svg>
      </div>
      <div class="tb-name">Harmik AI</div>
      <div class="tb-sep"></div>
      <div class="tb-sub">MegaFleet Portal</div>
    </div>
    <div class="tb-right">
      <div class="tb-time" id="home-clock">9:41</div>
      <button class="lock-btn" onclick="lockNow()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><rect x="5" y="10" width="14" height="10" rx="3" fill="currentColor"/></svg>
        Lock
      </button>
    </div>
  </div>

  <div class="main">
    <div class="greeting">
      <div class="greeting-h">Good <span id="greeting">morning</span>, <span class="name">Master Harmik</span></div>
      <div class="greeting-sub" id="greeting-date">Tuesday, June 9</div>
    </div>
    <div class="apps-grid" id="apps-grid"></div>
  </div>
</div>

<script>
const PASSWORD = "Megafleet424$";

// Clock
function tick(){
  const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');
  const h12=((h+11)%12)+1,t=h12+':'+m;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mons=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const ds=days[d.getDay()]+', '+mons[d.getMonth()]+' '+d.getDate();
  document.getElementById('lock-clock').textContent=t;
  document.getElementById('lock-date').textContent=ds;
  document.getElementById('home-clock').textContent=t;
  document.getElementById('greeting-date').textContent=ds;
  document.getElementById('greeting').textContent=h<12?'morning':h<17?'afternoon':'evening';
}
tick(); setInterval(tick,1000);

// Auth
const lockV=document.getElementById('lock'),homeV=document.getElementById('home');
const pwd=document.getElementById('pwd'),loginErr=document.getElementById('login-err');
function unlock(){lockV.classList.add('hidden');homeV.classList.remove('hidden');sessionStorage.setItem('mf','1');}
function lockNow(){homeV.classList.add('hidden');lockV.classList.remove('hidden');pwd.value='';loginErr.textContent='';sessionStorage.removeItem('mf');setTimeout(()=>pwd.focus(),400);}
document.getElementById('pwd-form').addEventListener('submit',e=>{
  e.preventDefault();
  if(pwd.value===PASSWORD){loginErr.textContent='';unlock();}
  else{
    loginErr.textContent='Incorrect password — please try again.';
    const w=document.querySelector('.pwd-wrap');w.classList.remove('shake');void w.offsetWidth;w.classList.add('shake');
    pwd.value='';pwd.focus();
  }
});
if(sessionStorage.getItem('mf')==='1'){unlock();}else{setTimeout(()=>pwd.focus(),300);}

// 3D tilt
function addTilt(el){
  const wrap=el.querySelector('.app-icon-wrap');
  el.addEventListener('mousemove',e=>{
    const r=wrap.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-.5;
    const y=(e.clientY-r.top)/r.height-.5;
    wrap.style.transform=`perspective(500px) rotateY(${x*16}deg) rotateX(${-y*16}deg) scale(1.1) translateY(-6px)`;
    wrap.style.boxShadow=`${-x*18}px ${-y*18+28}px 56px rgba(0,0,0,.22)`;
  });
  el.addEventListener('mouseleave',()=>{wrap.style.transform='';wrap.style.boxShadow='';});
}

// App icons
const ICONS={
  auto:`<svg viewBox="0 0 24 24" fill="none"><path d="M1 17l2-6h12l2 6M13 11V5h4l3 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="18.5" r="1.5" fill="#fff"/><circle cx="17.5" cy="18.5" r="1.5" fill="#fff"/></svg>`,
  track:`<svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-5.4 7-11a7 7 0 1 0-14 0c0 5.6 7 11 7 11Z" stroke="#fff" stroke-width="1.8"/><circle cx="12" cy="10" r="2.8" fill="#fff"/></svg>`,
  pct:`<svg viewBox="0 0 24 24" fill="none"><path d="M7 17 17 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="8" cy="8" r="2.4" stroke="#fff" stroke-width="1.8"/><circle cx="16" cy="16" r="2.4" stroke="#fff" stroke-width="1.8"/></svg>`,
  pay:`<svg viewBox="0 0 24 24" fill="none"><rect x="3.5" y="6" width="17" height="12" rx="2.5" stroke="#fff" stroke-width="1.8"/><path d="M3.5 10h17M6.5 14.5h3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>`,
  crm:`<svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="9" r="3" stroke="#fff" stroke-width="1.8"/><path d="M4 19a5 5 0 0 1 10 0M16 7.5a2.6 2.6 0 0 1 0 5M17.5 18.5a4.6 4.6 0 0 0-2.2-3.9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>`
};
const APPS=[
  {name:"O'Reilly's Auto",desc:"Parts & inventory",url:"https://megafleet-6g26tnah.manus.space",c:"ic-red",i:"auto"},
  {name:"LINX Tracking",desc:"Live load tracking",url:"https://megafleet-j5k7rjui.manus.space",c:"ic-blue",i:"track"},
  {name:"Agent Commission",desc:"Freight broker calc",url:"https://freightcalc-jrksoq4b.manus.space",c:"ic-dkred",i:"pct"},
  {name:"Payables",desc:"AP & billing",url:"https://megafleetpay-aijaerxz.manus.space/admin",c:"ic-navy",i:"pay"},
  {name:"CRM Outreach",desc:"Leads & contacts",url:"https://megafleet-dhzsbjcq.manus.space",c:"ic-mix",i:"crm"}
];
const grid=document.getElementById('apps-grid');
APPS.forEach(a=>{
  const btn=document.createElement('button');
  btn.className='app-tile';
  btn.innerHTML=`<div class="app-icon-wrap ${a.c}">${ICONS[a.i]}</div><div><div class="app-label">${a.name}</div><div class="app-sublabel">${a.desc}</div></div>`;
  btn.addEventListener('click',()=>{ window.location.href=a.url; });
  grid.appendChild(btn);
  addTilt(btn);
});
</script>
</body>
</html>
