<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmik AI Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;background:#040810;}

canvas#highway{position:fixed;inset:0;z-index:0;display:block;}

.view{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1),filter .6s;}
.view.hidden{opacity:0;transform:scale(.97) translateY(-18px);filter:blur(8px);pointer-events:none;}

/* ===== LOCK SCREEN ===== */
.lock-wrap{display:flex;flex-direction:column;align-items:center;gap:0;}

/* Truck hero */
.truck-hero{margin-bottom:18px;filter:drop-shadow(0 8px 30px rgba(240,30,44,.25)) drop-shadow(0 2px 8px rgba(21,101,192,.3));transition:filter .3s;}
.truck-hero:hover{filter:drop-shadow(0 12px 40px rgba(240,30,44,.45)) drop-shadow(0 4px 16px rgba(21,101,192,.5));}

/* Logo row */
.lock-logo{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.logo-mark{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#F01E2C,#A80D17);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(240,30,44,.4);}
.logo-text{font-size:34px;font-weight:700;color:#fff;letter-spacing:-.5px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.logo-text em{color:rgba(100,160,255,.85);font-style:normal;font-weight:300;}

/* Clock */
.lock-clock{font-size:124px;font-weight:100;letter-spacing:-7px;color:#fff;line-height:.88;text-align:center;text-shadow:0 4px 40px rgba(0,0,0,.6);margin-bottom:8px;}
.lock-date{font-size:18px;color:rgba(255,255,255,.45);text-align:center;letter-spacing:.3px;margin-bottom:36px;}

/* Login card */
.login-card{
  width:480px;
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1.5px solid rgba(255,255,255,.14);
  border-radius:30px;overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06) inset;
  transition:box-shadow .3s,transform .3s;
}
.login-card:hover{box-shadow:0 40px 110px rgba(0,0,0,.6),0 0 60px rgba(240,30,44,.08),0 0 0 1px rgba(255,255,255,.09) inset;}
.login-stripe{height:6px;background:linear-gradient(90deg,#F01E2C 0%,#A80D17 35%,#1565C0 65%,#0D47A1 100%);position:relative;overflow:hidden;}
.login-stripe::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);transition:left .7s ease;}
.login-card:hover .login-stripe::after{left:150%;}

.login-body{padding:36px 42px 30px;}
.login-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:-.3px;}
.login-sub{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:26px;}
.login-err{height:18px;font-size:13px;color:#FF6070;font-weight:600;margin-bottom:8px;}

.pwd-wrap{position:relative;}
.pwd{
  width:100%;height:60px;
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.1);
  border-radius:16px;
  color:#fff;font-size:17px;letter-spacing:3px;
  padding:0 70px 0 22px;outline:none;font-family:inherit;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.pwd::placeholder{color:rgba(255,255,255,.22);letter-spacing:.3px;font-size:14px;}
.pwd:focus{border-color:rgba(21,101,192,.7);box-shadow:0 0 0 4px rgba(21,101,192,.15);background:rgba(255,255,255,.1);}
.pwd-btn{
  position:absolute;right:8px;top:9px;
  width:44px;height:42px;
  background:linear-gradient(135deg,#F01E2C,#A80D17);
  border:none;border-radius:12px;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(240,30,44,.45);
}
.pwd-btn:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(240,30,44,.65);}
.pwd-btn:active{transform:scale(.88);}

.login-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 42px;
  background:rgba(0,0,0,.18);
  border-top:1px solid rgba(255,255,255,.07);
}
.lf-secure{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,255,255,.3);font-weight:500;}
.lf-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;}
.lf-brand{font-size:12px;font-weight:700;background:linear-gradient(90deg,#F01E2C,#1565C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.shake{animation:shake .4s ease;}
@keyframes shake{10%,90%{transform:translateX(-5px)}20%,80%{transform:translateX(7px)}30%,50%,70%{transform:translateX(-11px)}40%,60%{transform:translateX(11px)}}

/* ===== HOME ===== */
#home{justify-content:flex-start;background:#EEF1F8;}
.topbar{width:100%;height:68px;flex-shrink:0;background:linear-gradient(90deg,#0D1B3E,#1565C0 50%,#F01E2C);display:flex;align-items:center;padding:0 48px;justify-content:space-between;box-shadow:0 2px 20px rgba(13,27,62,.25);}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.tb-name{font-size:18px;font-weight:700;color:#fff;}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.2);margin:0 8px;}
.tb-sub{font-size:13px;color:rgba(255,255,255,.5);}
.tb-right{display:flex;align-items:center;gap:14px;}
.tb-time{font-size:15px;font-weight:600;color:rgba(255,255,255,.75);}
.lock-btn{padding:9px 18px;border-radius:10px;border:1.5px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:rgba(255,255,255,.88);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;font-family:inherit;}
.lock-btn:hover{background:rgba(255,255,255,.22);color:#fff;}
.main{width:100%;height:calc(100vh - 68px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;}
.greeting{text-align:center;margin-bottom:54px;}
.greeting-h{font-size:28px;font-weight:700;color:#111827;letter-spacing:-.3px;}
.greeting-h .name{background:linear-gradient(90deg,#F01E2C,#1565C0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.greeting-sub{font-size:14px;color:rgba(17,24,39,.38);margin-top:6px;}
.apps-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;max-width:1000px;}
.app-tile{display:flex;flex-direction:column;align-items:center;gap:16px;cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;width:160px;-webkit-tap-highlight-color:transparent;}
.app-icon-wrap{width:130px;height:130px;border-radius:34px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 14px 40px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.12);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;transform-style:preserve-3d;}
.app-icon-wrap::after{content:"";position:absolute;inset:0;border-radius:34px;background:linear-gradient(175deg,rgba(255,255,255,.28) 0%,transparent 55%);pointer-events:none;}
.app-tile:hover .app-icon-wrap{transform:scale(1.1) translateY(-6px);box-shadow:0 24px 56px rgba(0,0,0,.22),0 8px 20px rgba(0,0,0,.14);}
.app-tile:active .app-icon-wrap{transform:scale(.92) translateY(2px);}
.app-icon-wrap svg{width:60px;height:60px;position:relative;z-index:2;}
.ic-red{background:linear-gradient(145deg,#FF3A47,#C41020);}
.ic-blue{background:linear-gradient(145deg,#2A7DE8,#0D47A1);}
.ic-dkred{background:linear-gradient(145deg,#C41020,#7A0A12);}
.ic-navy{background:linear-gradient(145deg,#1E3A7A,#0A1B4A);}
.ic-mix{background:linear-gradient(145deg,#D41830,#1565C0);}
.app-label{font-size:15px;font-weight:700;color:#111827;text-align:center;line-height:1.25;}
.app-sublabel{font-size:12px;color:rgba(17,24,39,.4);text-align:center;margin-top:3px;}
</style>
</head>

<script>
/* ===================== HIGHWAY CANVAS ===================== */
const canvas = document.getElementById('highway');
let mx = 0, my = 0;
let stars = [];

function initStars(W, H) {
  stars = [];
  const HZ = H * 0.58;
  for (let i = 0; i < 140; i++) {
    stars.push({
      x: ((i * 137.508) % 1) * W,
      y: ((i * 97.334) % 1) * HZ * 0.9,
      r: 0.4 + ((i * 53.7) % 1) * 1.6,
      a: 0.25 + ((i * 71.1) % 1) * 0.75
    });
  }
}

function drawHighway() {
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const HZ = H * 0.58; // horizon y
  // Vanishing point follows mouse subtly
  const VX = W / 2 + (mx - W / 2) * 0.045;
  const VY = HZ + (my - H / 2) * 0.018;

  if (!stars.length) initStars(W, H);

  /* 1. Sky */
  const sky = ctx.createLinearGradient(0, 0, 0, HZ + 20);
  sky.addColorStop(0, '#020610');
  sky.addColorStop(0.55, '#0A1228');
  sky.addColorStop(1, '#0F1C42');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, HZ + 20);

  /* 2. Stars */
  stars.forEach(s => {
    const px = s.x + (mx - W/2) * 0.008;
    const py = s.y + (my - H/2) * 0.006;
    ctx.beginPath();
    ctx.arc(px, py, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  /* 3. City glow on horizon */
  const cg = ctx.createRadialGradient(W/2, HZ, 0, W/2, HZ, W * 0.55);
  cg.addColorStop(0, 'rgba(25,65,200,0.22)');
  cg.addColorStop(0.35, 'rgba(15,40,140,0.12)');
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg;
  ctx.fillRect(0, HZ - 100, W, 200);

  /* 4. Distant city skyline */
  ctx.fillStyle = '#080E1E';
  const blds = [.06,.12,.09,.16,.08,.2,.11,.14,.07,.18,.1,.22,.13,.08,.17,.1,.15,.09,.12,.07,.19,.11];
  blds.forEach((h, i) => {
    const bx = (i / (blds.length - 1)) * W;
    const bh = h * HZ * 0.38;
    const bw = (W / blds.length) * 0.72;
    ctx.fillRect(bx - bw/2, HZ - bh, bw, bh + 2);
  });
  // Building windows
  blds.forEach((h, i) => {
    const bx = (i / (blds.length - 1)) * W;
    const bh = h * HZ * 0.38;
    const bw = (W / blds.length) * 0.72;
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 3; c++) {
        if (((i*7+r*3+c*11) % 3) !== 0) {
          ctx.fillStyle = `rgba(255,200,80,${0.3 + ((i+r+c) % 5) * 0.1})`;
          ctx.fillRect(bx - bw/2 + c*(bw/3) + 3, HZ - bh + r*(bh/4.5) + 4, 3, 4);
        }
      }
    }
  });

  /* 5. Horizon line glow */
  const hl = ctx.createLinearGradient(0, HZ - 2, 0, HZ + 4);
  hl.addColorStop(0, 'rgba(50,100,255,0.18)');
  hl.addColorStop(1, 'transparent');
  ctx.fillStyle = hl;
  ctx.fillRect(0, HZ - 2, W, 6);

  /* 6. Road surface */
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(VX - 50, VY);
  ctx.lineTo(VX + 50, VY);
  ctx.lineTo(W, H);
  const road = ctx.createLinearGradient(0, VY, 0, H);
  road.addColorStop(0, '#0A0C12');
  road.addColorStop(1, '#0E1018');
  ctx.fillStyle = road;
  ctx.fill();

  /* 7. Road center lane line (subtle) */
  ctx.beginPath();
  ctx.moveTo(W * 0.33, H);
  ctx.lineTo(VX - 16, VY + 5);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(W * 0.67, H);
  ctx.lineTo(VX + 16, VY + 5);
  ctx.stroke();

  /* 8. White edge lines */
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.moveTo(W * 0.02, H);
  ctx.lineTo(VX - 45, VY + 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(W * 0.98, H);
  ctx.lineTo(VX + 45, VY + 2);
  ctx.stroke();

  /* 9. Perspective dashed center line */
  for (let t = 0; t < 0.97; t += 0.085) {
    const t1 = t, t2 = Math.min(t + 0.048, 0.97);
    const x1 = W/2 + (VX - W/2) * (1 - t1);
    const y1 = H + (VY - H) * (1 - t1);
    const x2 = W/2 + (VX - W/2) * (1 - t2);
    const y2 = H + (VY - H) * (1 - t2);
    const alpha = 0.22 + t * 0.55;
    const lw = 0.8 + t1 * 2.5;
    ctx.strokeStyle = `rgba(255,240,120,${alpha})`;
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  /* 10. Road reflectors on edges */
  for (let t = 0.05; t < 0.95; t += 0.11) {
    const lx = W*0.02 + (VX - 45 - W*0.02) * t;
    const ly = H + (VY + 2 - H) * t;
    const rx = W*0.98 + (VX + 45 - W*0.98) * t;
    const ry = H + (VY + 2 - H) * t;
    const sz = 1.5 + t * 2;
    ctx.fillStyle = `rgba(255,200,80,${0.4 + t * 0.5})`;
    ctx.beginPath(); ctx.arc(lx, ly, sz, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx, ry, sz, 0, Math.PI*2); ctx.fill();
  }

  /* 11. Headlight beams (from bottom, track mouse X) */
  const lbx = W * 0.38 + (mx - W/2) * 0.06;
  const rbx = W * 0.62 + (mx - W/2) * 0.06;
  const lbeam = ctx.createLinearGradient(lbx, H, VX - 10, VY + 60);
  lbeam.addColorStop(0, 'rgba(255,235,120,0.22)');
  lbeam.addColorStop(0.6, 'rgba(255,235,120,0.06)');
  lbeam.addColorStop(1, 'transparent');
  ctx.fillStyle = lbeam;
  ctx.beginPath();
  ctx.moveTo(lbx - 60, H);
  ctx.lineTo(lbx + 60, H);
  ctx.lineTo(VX + 10, VY + 60);
  ctx.closePath();
  ctx.fill();

  const rbeam = ctx.createLinearGradient(rbx, H, VX + 10, VY + 60);
  rbeam.addColorStop(0, 'rgba(255,235,120,0.22)');
  rbeam.addColorStop(0.6, 'rgba(255,235,120,0.06)');
  rbeam.addColorStop(1, 'transparent');
  ctx.fillStyle = rbeam;
  ctx.beginPath();
  ctx.moveTo(rbx - 60, H);
  ctx.lineTo(rbx + 60, H);
  ctx.lineTo(VX - 10, VY + 60);
  ctx.closePath();
  ctx.fill();

  /* 12. Road surface sheen (center strip of lighter asphalt) */
  const sheen = ctx.createLinearGradient(VX, VY, VX, H);
  sheen.addColorStop(0, 'transparent');
  sheen.addColorStop(0.4, 'rgba(255,235,140,0.03)');
  sheen.addColorStop(1, 'rgba(255,235,140,0.06)');
  ctx.fillStyle = sheen;
  ctx.beginPath();
  ctx.moveTo(VX - 120, H);
  ctx.lineTo(VX - 3, VY + 20);
  ctx.lineTo(VX + 3, VY + 20);
  ctx.lineTo(VX + 120, H);
  ctx.closePath();
  ctx.fill();

  /* 13. Vignette */
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

/* ===================== CLOCK ===================== */
function tick() {
  const d = new Date(), h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const h12 = ((h+11)%12)+1, t = h12+':'+m;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mons=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const ds = days[d.getDay()]+', '+mons[d.getMonth()]+' '+d.getDate();
  document.getElementById('lock-clock').textContent = t;
  document.getElementById('lock-date').textContent = ds;
  document.getElementById('home-clock').textContent = t;
  document.getElementById('greeting-date').textContent = ds;
  document.getElementById('greeting').textContent = h<12?'morning':h<17?'afternoon':'evening';
}
tick(); setInterval(tick, 1000);
