  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h13M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fform>\n            <div class=\"pwd-hint\" id=\"pwd-hint\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ===== HOME SCREEN ===== -->\n        <div class=\"view\" id=\"home\">\n          <div class=\"home-head\">\n            <div class=\"h-time\" id=\"home-time\">9:41<\u002Fdiv>\n            <div class=\"h-date\" id=\"home-date\">Monday, June 9<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"grid\" id=\"grid\"><\u002Fdiv>\n\n          <div class=\"dots\"><i class=\"on\"><\u002Fi><i><\u002Fi><\u002Fdiv>\n\n          <div class=\"dock\" id=\"dock\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Launch overlay -->\n        <div id=\"launch\"><div class=\"ltile\"><\u002Fdiv><\u002Fdiv>\n\n        <div class=\"home-ind\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hint-tap\" id=\"taphint\">Tap the time on the home screen to lock<\u002Fdiv>\n\n<script>\n  const PASSWORD = \"Megafleet424$\";\n\n  // ---- App definitions ----\n  const ICONS = {\n    auto:'<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 16l1.5-4.5A2 2 0 0 1 8.4 10h7.2a2 2 0 0 1 1.9 1.5L19 16M5 16h14M5 16v2.5A1.5 1.5 0 0 0 6.5 20H7a1.5 1.5 0 0 0 1.5-1.5V18M19 16v2.5A1.5 1.5 0 0 1 17.5 20H17a1.5 1.5 0 0 1-1.5-1.5V18\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"7.5\" cy=\"16\" r=\"1.1\" fill=\"#fff\"/><circle cx=\"16.5\" cy=\"16\" r=\"1.1\" fill=\"#fff\"/><\u002Fsvg>',\n    track:'<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 21s7-5.4 7-11a7 7 0 1 0-14 0c0 5.6 7 11 7 11Z\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linejoin=\"round\"/><circle cx=\"12\" cy=\"10\" r=\"2.6\" fill=\"#fff\"/><\u002Fsvg>',\n    pct:'<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 17 17 7\" stroke=\"#fff\" stroke-width=\"1.9\" stroke-linecap=\"round\"/><circle cx=\"8\" cy=\"8\" r=\"2.2\" stroke=\"#fff\" stroke-width=\"1.8\"/><circle cx=\"16\" cy=\"16\" r=\"2.2\" stroke=\"#fff\" stroke-width=\"1.8\"/><\u002Fsvg>',\n    pay:'<svg viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3.5\" y=\"6\" width=\"17\" height=\"12\" rx=\"2.5\" stroke=\"#fff\" stroke-width=\"1.8\"/><path d=\"M3.5 10h17\" stroke=\"#fff\" stroke-width=\"1.8\"/><path d=\"M6.5 14.5h3\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    crm:'<svg viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"9\" cy=\"9\" r=\"3\" stroke=\"#fff\" stroke-width=\"1.8\"/><path d=\"M4 19a5 5 0 0 1 10 0\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><path d=\"M16 7.5a2.6 2.6 0 0 1 0 5M17.5 18.5a4.6 4.6 0 0 0-2.2-3.9\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><\u002Fsvg>'\n  };\n\n  const APPS = [\n    { name:\"O'Reilly's Auto\", url:\"https://megafleet-6g26tnah.manus.space\", cls:\"g-green\",  icon:ICONS.auto },\n    { name:\"LINX Tracking\",   url:\"https://megafleet-6g26tnah.manus.space\", cls:\"g-blue\",   icon:ICONS.track },\n    { name:\"Agent Commission\",url:\"/commission\", cls:\"g-orange\", icon:ICONS.pct },\n    { name:\"Payables\",        url:\"https://megafleetpay-aijaerxz.manus.space\", cls:\"g-teal\",   icon:ICONS.pay },\n    { name:\"CRM Outreach\",    url:\"https://megafleet-dhzsbjcq.manus.space\", cls:\"g-purple\", icon:ICONS.crm }\n  ];\n\n  // Build grid\n  const grid = document.getElementById('grid');\n  APPS.forEach(a=>{\n    const b = document.createElement('button');\n    b.className = 'app';\n    b.innerHTML = `<span class=\"tile ${a.cls}\">${a.icon}<\u002Fspan><span class=\"label\">${a.name}<\u002Fspan>`;\n    b.addEventListener('click', ()=> launch(a));\n    grid.appendChild(b);\n  });\n  // Dock = favorites\n  const dock = document.getElementById('dock');\n  [APPS[0],APPS[2],APPS[3],APPS[4]].forEach(a=>{\n    const b = document.createElement('button');\n    b.className = 'app';\n    b.innerHTML = `<span class=\"tile ${a.cls}\">${a.icon}<\u002Fspan>`;\n    b.addEventListener('click', ()=> launch(a));\n    dock.appendChild(b);\n  });\n\n  // ---- App launch animation ----\n  function launch(a){\n    const overlay = document.getElementById('launch');\n    const lt = overlay.querySelector('.ltile');\n    lt.className = 'ltile ' + a.cls;\n    overlay.classList.remove('go'); void overlay.offsetWidth;\n    overlay.classList.add('go');\n    setTimeout(()=>{ window.location.href = a.url; }, 560);\n  }\n\n  // ---- Clock ----\n  function tick(){\n    const d = new Date();\n    let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');\n    const ampm = h>=12?'':''; // 24h-free, iOS style without am/pm on big clock\n    const h12 = ((h+11)%12)+1;\n    const t = h12 + ':' + m;\n    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];\n    const mons=['January','February','March','April','May','June','July','August','September','October','November','December'];\n    const dateStr = days[d.getDay()]+', '+mons[d.getMonth()]+' '+d.getDate();\n    const sbt = h12 + ':' + m;\n    document.getElementById('lock-time').textContent = t;\n    document.getElementById('lock-date').textContent = dateStr;\n    document.getElementById('home-time').textContent = sbt;\n    document.getElementById('home-date').textContent = dateStr;\n    document.getElementById('sb-time').textContent = sbt;\n  }\n  tick(); setInterval(tick, 1000);\n\n  // ---- Unlock logic ----\n  const lock = document.getElementById('lock');\n  const home = document.getElementById('home');\n  const pwd = document.getElementById('pwd');\n  const hint = document.getElementById('pwd-hint');\n  const form = document.getElementById('pwd-form');\n\n  function unlock(){\n    lock.classList.add('hidden');\n    home.classList.add('show');\n    sessionStorage.setItem('mf_unlocked','1');\n    document.getElementById('taphint').style.display='block';\n  }\n  function lockNow(){\n    lock.classList.remove('hidden');\n    home.classList.remove('show');\n    pwd.value=''; hint.textContent='';\n    sessionStorage.removeItem('mf_unlocked');\n    setTimeout(()=>pwd.focus(), 400);\n  }\n\n  form.addEventListener('submit', e=>{\n    e.preventDefault();\n    if(pwd.value === PASSWORD){\n      hint.textContent=''; unlock();\n    } else {\n      hint.textContent = 'Incorrect password. Try again.';\n      const wrap = document.querySelector('.pwd-wrap');\n      wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');\n      pwd.value=''; pwd.focus();\n    }\n  });\n\n  // Tap time to lock again\n  document.getElementById('home-time').addEventListener('click', lockNow);\n\n  // Restore session\n  if(sessionStorage.getItem('mf_unlocked')==='1'){\n    lock.classList.add('hidden'); home.classList.add('show');\n  } else {\n    document.getElementById('taphint').style.display='none';\n    setTimeout(()=>pwd.focus(), 500);\n  }\n\n  // ---- Scale phone to viewport ----\n  function fit(){\n    const stage = document.getElementById('stage');\n    const phoneH = 940, phoneW = 440;\n    const scale = Math.min((window.innerHeight-24)/phoneH, (window.innerWidth-24)/phoneW);\n    stage.style.transform = 'scale('+scale+')';\n  }\n  fit(); window.addEventListener('resize', fit);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
